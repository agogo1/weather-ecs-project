version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 343218226443.dkr.ecr.us-east-1.amazonaws.com

      - REPOSITORY_URI=343218226443.dkr.ecr.us-east-1.amazonaws.com/weather-app
      - IMAGE_TAG=latest

  build:
    commands:
      - echo Build started
      - docker build -t weather-app ./app
      - docker tag weather-app:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing image...
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - printf '[{"name":"weather-app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json